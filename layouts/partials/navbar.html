<nav class="custom-navbar" id="navbar">
    <div class="nav-inner">
        <a href="/" class="nav-brand">GGG Blog</a>
        <div class="nav-links" id="navLinks">
            <a href="/">首页</a>
            <a href="/post/">归档</a>
            <a href="/categories/">分类</a>
            <a href="/tags/">标签</a>
            <a href="/gallery/">相册</a>
            <a href="/search/">搜索</a>
            <button class="nav-theme-btn" id="themeToggle">🌓</button>
        </div>
        <button class="nav-hamburger" id="navToggle">☰</button>
    </div>
</nav>
<script>
(function() {
    const html = document.documentElement;
    const t = document.getElementById('themeToggle');
    if(t) t.addEventListener('click',function(){
        const c=html.getAttribute('data-scheme')||'light';
        html.setAttribute('data-scheme',c==='dark'?'light':'dark');
        localStorage.setItem('StackColorScheme',html.getAttribute('data-scheme'));
    });
    const nt=document.getElementById('navToggle'),nl=document.getElementById('navLinks');
    if(nt&&nl) nt.addEventListener('click',function(){nl.classList.toggle('open');});
    const nb=document.getElementById('navbar');
    if(nb) window.addEventListener('scroll',function(){nb.classList.toggle('scrolled',window.scrollY>50);});
})();
</script>
